<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Duizend — leer Nederlands</title>
<meta name="theme-color" content="#003082">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Duizend">
<style>
:root{
  --blue:#003082; --blue-deep:#001d52; --yellow:#FFC917; --paper:#F4F5F1;
  --ink:#10254E; --oranje:#E8590C; --line:#D9DDE6; --muted:#6B7590;
  --ok:#1E7A4C; --err:#B3261E; --card:#FFFFFF;
  --disp:"Futura","Avenir Next","Century Gothic","Trebuchet MS",sans-serif;
  --body:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:var(--body);background:var(--paper);color:var(--ink);
  padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);
  max-width:520px;margin:0 auto}
button{font-family:inherit;cursor:pointer;border:none}
button:focus-visible,input:focus-visible,textarea:focus-visible{outline:3px solid var(--oranje);outline-offset:2px}

header{background:var(--blue);color:#fff;padding:18px 20px 14px;position:relative}
header::after{content:"";display:block;position:absolute;left:0;right:0;bottom:0;height:6px;background:var(--yellow)}
.brand{font-family:var(--disp);font-weight:800;font-size:30px;letter-spacing:.06em;text-transform:uppercase}
.brand em{font-style:normal;color:var(--yellow)}
.tagline{font-size:13px;opacity:.85;margin-top:2px}
.profiles{display:flex;gap:8px;margin-top:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.profiles::-webkit-scrollbar{display:none}
.profilebtn{flex:0 0 auto;background:rgba(255,255,255,.12);color:#fff;border-radius:10px;padding:9px 14px;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:6px;white-space:nowrap}
.profilebtn.on{background:var(--yellow);color:var(--blue-deep)}

main{padding:20px 20px 40px}
.screen{display:none}
.screen.active{display:block}

.gevels{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 14px 10px;margin-bottom:16px}
.gevels-label{font-family:var(--disp);font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.gevel-row{display:flex;align-items:flex-end;gap:4px;height:74px}
.gevel{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.gevel svg{width:100%;height:56px;display:block}
.gevel .day{font-size:10px;color:var(--muted);font-variant:tabular-nums}
.gevel.today .day{font-weight:700;color:var(--blue)}
.gevel svg .body{fill:#E7EAF1;stroke:var(--line);stroke-width:1}
.gevel.done svg .body{fill:var(--oranje);stroke:var(--blue-deep)}
.gevel svg .win{fill:#fff;opacity:0}
.gevel.done svg .win{opacity:.9}

.stats{display:flex;gap:10px;margin-bottom:16px}
.stat{flex:1;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 10px;text-align:center}
.stat b{display:block;font-family:var(--disp);font-size:26px;font-weight:800;color:var(--blue)}
.stat span{font-size:11px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase}

.startbtn{width:100%;background:var(--yellow);color:var(--blue-deep);font-family:var(--disp);
  font-size:19px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;
  padding:18px;border-radius:14px;border-bottom:4px solid #C79600}
.startbtn:active{transform:translateY(2px);border-bottom-width:2px}
.startbtn[disabled]{opacity:.5}
.subnote{text-align:center;font-size:13px;color:var(--muted);margin-top:10px}
.moderow{display:flex;gap:10px;margin-top:14px}
.modebtn{flex:1;background:var(--blue);color:#fff;border-radius:14px;padding:14px 8px;font-family:var(--disp);font-weight:800;font-size:15px;letter-spacing:.04em;text-transform:uppercase;border-bottom:4px solid var(--blue-deep);position:relative}
.modebtn small{display:block;font-family:var(--body);font-weight:400;font-size:11px;text-transform:none;letter-spacing:0;opacity:.8;margin-top:3px}
.modebtn:active{transform:translateY(2px);border-bottom-width:2px}
.modebtn .badge{position:absolute;top:-7px;right:-4px;background:var(--oranje);color:#fff;font-size:10px;font-family:var(--body);font-weight:700;padding:3px 8px;border-radius:10px;text-transform:none;letter-spacing:0}

.homelinks{display:flex;gap:8px;margin-top:22px}
.homelinks button{flex:1;background:transparent;border:1px solid var(--line);border-radius:10px;padding:10px;font-size:13px;color:var(--ink)}
.settings{margin-top:16px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;display:none}
.settings.open{display:block}
.setrow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;gap:10px;flex-wrap:wrap}
.setrow label{font-size:14px}
.seg{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
.seg button{background:#fff;padding:7px 11px;font-size:13px;color:var(--ink)}
.seg button.on{background:var(--blue);color:#fff}
.keyinput{width:100%;padding:10px;border:1px solid var(--line);border-radius:8px;font-size:13px}
.sethint{font-size:11px;color:var(--muted);width:100%;line-height:1.4}

.sess-top{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.sess-top button{background:transparent;font-size:14px;color:var(--muted)}
.prog{flex:1;height:8px;background:#E3E6EE;border-radius:4px;overflow:hidden}
.prog i{display:block;height:100%;background:var(--blue);border-radius:4px;transition:width .3s}

.kaart{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:26px 22px;min-height:300px;display:flex;flex-direction:column}
.kaart .mode-tag{font-family:var(--disp);font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);display:flex;justify-content:space-between;align-items:center}
.cognate-tag{color:var(--oranje);font-size:11px;font-weight:700;letter-spacing:.1em}
.kaart h2{font-family:var(--disp);font-size:34px;font-weight:800;color:var(--blue);margin-top:14px;line-height:1.15;overflow-wrap:break-word}
.kaart .zin{font-size:19px;margin-top:10px;line-height:1.45}
.kaart .prompt-en{font-size:20px;margin-top:14px;line-height:1.5;font-weight:600}
.speak{background:var(--blue);color:#fff;border-radius:50%;width:40px;height:40px;font-size:18px;flex-shrink:0}
.answer{border-top:2px dashed var(--line);margin-top:18px;padding-top:16px;display:none}
.answer.show{display:block}
.answer .gloss{font-size:18px;font-weight:600}
.answer .sv{font-size:14px;color:var(--muted);margin-top:4px}
.answer .sv b{color:var(--oranje);font-weight:700}
.answer .xen{font-size:14px;color:var(--muted);margin-top:8px;font-style:italic}
.shadow-tip{margin-top:12px;background:#EEF2FA;border-radius:10px;padding:10px 12px;font-size:13px;color:var(--blue);display:flex;align-items:center;gap:10px}
.shadow-tip button{background:var(--blue);color:#fff;border-radius:8px;padding:7px 10px;font-size:12px;flex-shrink:0}
.spacer{flex:1}
.btnrow{display:flex;gap:10px;margin-top:18px}
.btnrow button{flex:1;padding:15px 6px;border-radius:12px;font-family:var(--disp);font-weight:800;font-size:15px;letter-spacing:.04em;text-transform:uppercase}
.b-reveal{background:var(--blue);color:#fff;border-bottom:4px solid var(--blue-deep)}
.b-again{background:#F6E3E1;color:var(--err)}
.b-good{background:var(--blue);color:#fff}
.b-easy{background:var(--yellow);color:var(--blue-deep)}
.b-check{background:var(--blue);color:#fff;border-bottom:4px solid var(--blue-deep)}
.btnrow button:active{transform:translateY(1px)}
.typebox{margin-top:16px}
.typebox input{width:100%;padding:14px;font-size:17px;border:2px solid var(--line);border-radius:12px;background:#fff;color:var(--ink)}
.typebox input:focus{border-color:var(--blue)}
.feedback{margin-top:14px;border-radius:12px;padding:14px;font-size:15px;display:none;line-height:1.5}
.feedback.show{display:block}
.feedback.ok{background:#E3F1E9;color:var(--ok)}
.feedback.close{background:#FFF3D6;color:#7A5A00}
.feedback.no{background:#F6E3E1;color:var(--err)}
.feedback .correct-zin{font-weight:700;font-size:17px;display:block;margin-top:6px;color:var(--ink)}

.done-wrap{text-align:center;padding-top:30px}
.done-wrap svg{width:120px;height:96px}
.done-wrap svg .body{fill:var(--oranje);stroke:var(--blue-deep);stroke-width:1.5}
.done-wrap svg .win{fill:#fff}
.done-wrap h2{font-family:var(--disp);font-size:30px;font-weight:800;color:var(--blue);text-transform:uppercase;letter-spacing:.04em;margin-top:14px}
.done-wrap p{margin-top:10px;color:var(--muted);font-size:15px;line-height:1.6}
.done-wrap .startbtn{margin-top:26px}

/* Lezen */
.story-list{display:flex;flex-direction:column;gap:10px}
.story-item{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;display:flex;justify-content:space-between;align-items:center;gap:10px;text-align:left;width:100%}
.story-item h3{font-family:var(--disp);font-size:17px;color:var(--blue)}
.story-item span{font-size:12px;color:var(--muted)}
.story-item.locked{opacity:.5}
.story-item .lock{font-size:20px}
.reader{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:24px 22px}
.reader h2{font-family:var(--disp);font-size:26px;font-weight:800;color:var(--blue);margin-bottom:6px}
.reader .rtools{display:flex;gap:8px;margin:10px 0 16px}
.reader .rtools button{background:var(--blue);color:#fff;border-radius:10px;padding:9px 14px;font-size:13px}
.reader .rtxt{font-size:19px;line-height:1.85}
.reader .rtxt span.w{border-radius:4px;padding:1px 1px}
.reader .rtxt span.w:active{background:var(--yellow)}
.glossbar{position:sticky;bottom:10px;margin-top:18px;background:var(--blue-deep);color:#fff;border-radius:12px;padding:12px 14px;font-size:14px;display:none}
.glossbar.show{display:block}
.glossbar b{color:var(--yellow)}
.readhint{font-size:12px;color:var(--muted);margin-top:14px;text-align:center}

/* Schrijven */
.schrijf{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:22px}
.schrijf h2{font-family:var(--disp);font-size:22px;font-weight:800;color:var(--blue)}
.schrijf p.intro{font-size:14px;color:var(--muted);margin-top:6px;line-height:1.5}
.targets{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0}
.target{background:#EEF2FA;color:var(--blue);border-radius:20px;padding:7px 13px;font-size:14px;font-weight:600}
.target.used{background:#E3F1E9;color:var(--ok);text-decoration:line-through}
.schrijf textarea{width:100%;min-height:150px;padding:14px;font-size:17px;line-height:1.5;border:2px solid var(--line);border-radius:12px;background:#fff;color:var(--ink);resize:vertical;font-family:var(--body)}
.schrijf textarea:focus{border-color:var(--blue)}
.airesult{margin-top:14px;background:#EEF2FA;border-radius:12px;padding:14px;font-size:14px;line-height:1.6;white-space:pre-wrap;display:none}
.airesult.show{display:block}
.journal{margin-top:22px}
.journal h3{font-family:var(--disp);font-size:13px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.jentry{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:10px;font-size:14px;line-height:1.5}
.jentry .jdate{font-size:11px;color:var(--muted);margin-bottom:4px}

.backrow{margin-bottom:16px}
.backrow button{background:transparent;font-size:14px;color:var(--muted)}
.toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%);background:var(--blue-deep);color:#fff;padding:10px 18px;border-radius:20px;font-size:14px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:9}
.toast.show{opacity:1}
@media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>

<header>
  <div class="brand" id="brandTitle">Dui<em>zend</em></div>
  <div class="tagline" id="brandTagline">Jouw eerste 1000 woorden Nederlands</div>
  <div class="profiles" id="profileTabs"></div>
</header>

<main>
  <!-- HOME -->
  <section class="screen active" id="scr-home">
    <div class="gevels">
      <div class="gevels-label" id="gevelsLabel">Deze week aan de gracht</div>
      <div class="gevel-row" id="gevelRow"></div>
    </div>
    <div class="stats">
      <div class="stat"><b id="stLearned">0</b><span>gestart</span></div>
      <div class="stat"><b id="stDue">0</b><span>te herhalen</span></div>
      <div class="stat"><b id="stStreak">0</b><span>dagen streak</span></div>
    </div>
    <button class="startbtn" id="btnStart"></button>
    <div class="subnote" id="sessNote"></div>
    <div class="moderow">
      <button class="modebtn" id="btnLezen"><span id="lezenLabel"></span><small id="lezenNote"></small></button>
      <button class="modebtn" id="btnSchrijf"><span id="schrijfLabel"></span><small id="schrijfNote"></small><span class="badge" id="schrijfBadge" style="display:none"></span></button>
    </div>
    <div class="homelinks">
      <button id="btnSettings"></button>
      <button id="btnExport"></button>
      <button id="btnImport"></button>
    </div>
    <input type="file" id="importFile" accept=".json" style="display:none">
    <div class="settings" id="settingsPanel">
      <div class="setrow">
        <label id="lblNewPerDay"></label>
        <div class="seg" id="segNew">
          <button data-v="5">5</button><button data-v="8">8</button><button data-v="15">15</button><button data-v="20">20</button>
        </div>
      </div>
      <div class="setrow">
        <label id="lblMode"></label>
        <div class="seg" id="segMode">
          <button data-v="auto" id="modeAuto"></button><button data-v="flash" id="modeFlash"></button><button data-v="type" id="modeType"></button>
        </div>
      </div>
      <div class="setrow">
        <label style="width:100%" id="lblApiKey"></label>
        <input type="password" class="keyinput" id="apiKeyIn" placeholder="sk-ant-…">
        <span class="sethint" id="apiKeyHint"></span>
      </div>
      <div class="setrow">
        <label id="lblResetAll"></label>
        <div class="seg"><button id="btnReset" style="color:var(--err)"></button></div>
      </div>
    </div>
  </section>

  <!-- SESSION -->
  <section class="screen" id="scr-sess">
    <div class="sess-top">
      <button id="btnQuit"></button>
      <div class="prog"><i id="progBar"></i></div>
      <span id="progTxt" style="font-size:13px;color:var(--muted);font-variant:tabular-nums"></span>
    </div>
    <div class="kaart" id="kaart"></div>
  </section>

  <!-- DONE -->
  <section class="screen" id="scr-done">
    <div class="done-wrap">
      <svg viewBox="0 0 50 40"><path class="body" d="M25 2 L38 12 L38 16 L42 16 L42 40 L8 40 L8 16 L12 16 L12 12 Z"/><rect class="win" x="20" y="18" width="10" height="8" rx="1"/><rect class="win" x="20" y="30" width="10" height="10" rx="1"/></svg>
      <h2 id="doneTitle"></h2>
      <p id="doneStats"></p>
      <button class="startbtn" id="btnHome"></button>
    </div>
  </section>

  <!-- LEZEN LIST -->
  <section class="screen" id="scr-lezen">
    <div class="backrow"><button class="backbtn"></button></div>
    <div class="story-list" id="storyList"></div>
    <p class="readhint" id="readHintLezen"></p>
  </section>

  <!-- READER -->
  <section class="screen" id="scr-reader">
    <div class="backrow"><button id="btnReaderBack"></button></div>
    <div class="reader">
      <h2 id="rTitle"></h2>
      <div class="rtools">
        <button id="rPlay"></button>
        <button id="rPlaySlow"></button>
        <button id="rStop"></button>
      </div>
      <div class="rtxt" id="rTxt"></div>
      <div class="glossbar" id="glossBar"></div>
      <p class="readhint" id="readHintReader"></p>
    </div>
  </section>

  <!-- SCHRIJVEN -->
  <section class="screen" id="scr-schrijf">
    <div class="backrow"><button class="backbtn"></button></div>
    <div class="schrijf">
      <h2 id="schrijfTitle"></h2>
      <p class="intro" id="schrijfIntro"></p>
      <div class="targets" id="targets"></div>
      <textarea id="schrijfTxt" autocorrect="off" autocapitalize="sentences"></textarea>
      <div class="btnrow">
        <button class="b-good" id="btnSaveEntry"></button>
        <button class="b-easy" id="btnAiCheck"></button>
      </div>
      <div class="btnrow" style="margin-top:8px">
        <button style="background:#EEF2FA;color:var(--blue)" id="btnCopyPrompt"></button>
        <button style="background:#EEF2FA;color:var(--blue)" id="btnNewTargets"></button>
      </div>
      <div class="airesult" id="aiResult"></div>
    </div>
    <div class="journal" id="journal"></div>
  </section>
</main>

<div class="toast" id="toast"></div>

<script src="./data.js"></script>
<script src="./data-sv.js"></script>
<script src="./data-es.js"></script>
<script src="./stories.js"></script>
<script src="./stories-sv.js"></script>
<script src="./stories-es.js"></script>
<script>

/* ================= i18n ================= */

const DAY=86400000;

/* ================= SRS v2 =================
   Learning phase: two Good steps (same session, then graduate).
   Lapses on mature cards halve the interval instead of resetting ("relearn"),
   which avoids low-interval hell; ease still drops. Cognates graduate with
   longer first intervals. Returns true when the card leaves this session. */
function schedule(c,grade,isCognate){
  c.ef=c.ef||2.5;
  if(grade==="again"){
    c.ef=Math.max(1.3,c.ef-0.2);
    if(c.iv>=1){ // mature lapse: relearn with halved interval
      c.iv=Math.max(1,Math.round(c.iv*0.5));
      c.due=Date.now()+c.iv*DAY;
      return true;
    }
    c.step=0;return false; // learning card: requeue this session
  }
  if(!c.iv){ // learning phase
    if(grade==="good"){
      c.step=(c.step||0)+1;
      if(c.step<2)return false;      // step 1: re-show later this session
      c.iv=isCognate?2:1;            // step 2: graduate
    }else{ c.iv=isCognate?4:2 }      // easy: graduate immediately
    c.r=(c.r||0)+1;c.due=Date.now()+c.iv*DAY;return true;
  }
  // review phase
  if(grade==="good"){c.iv=Math.round(c.iv*c.ef)}
  else{c.iv=Math.round(c.iv*c.ef*1.35);c.ef=Math.min(3,c.ef+0.05)}
  c.r=(c.r||0)+1;c.due=Date.now()+c.iv*DAY;
  return true;
}

function dueCards(){const now=Date.now();return Object.keys(S.cards).filter(id=>S.cards[id].due<=now).map(Number).sort((a,b)=>S.cards[a].due-S.cards[b].due)}
function newAllowance(){if(S.newLog.date!==today()){S.newLog={date:today(),count:0}}return Math.max(0,S.settings.newPerDay-S.newLog.count)}
function unseen(){return WORDS.filter(w=>!S.cards[w.i]).map(w=>w.i)}
function buildQueue(){
  const due=dueCards().slice(0,100);
  const fresh=unseen().slice(0,newAllowance());
  const q=[];let d=0,n=0;
  while(d<due.length||n<fresh.length){
    if(d<due.length)q.push(due[d++]);
    if(d<due.length)q.push(due[d++]);
    if(n<fresh.length)q.push(fresh[n++]);
  }
  return q;
}
function graduatedIds(){return Object.keys(S.cards).filter(id=>(S.cards[id].r||0)>=1).map(Number)}

/* ================= fuzzy matching ================= */
function norm(s){return s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9\s]/g," ").replace(/\s+/g," ").trim()}
function lev(a,b){
  const m=a.length,n=b.length;if(!m)return n;if(!n)return m;
  let prev=Array.from({length:n+1},(_,j)=>j),cur=new Array(n+1);
  for(let i=1;i<=m;i++){cur[0]=i;
    for(let j=1;j<=n;j++){cur[j]=Math.min(prev[j]+1,cur[j-1]+1,prev[j-1]+(a[i-1]===b[j-1]?0:1))}
    [prev,cur]=[cur,prev];
  }
  return prev[n];
}
function similarity(a,b){a=norm(a);b=norm(b);if(!a||!b)return 0;const d=lev(a,b);return 1-d/Math.max(a.length,b.length)}
function stripArticle(w){return norm(w).replace(/^(de|het|een|en|ett|el|la|los|las)\s+/,"")}
function hintFor(target){
  const FILLERS=new Set(["att","de","het","een","el","la","los","las"]);
  const words=target.split(" ").filter(Boolean);
  let idx=0;
  while(idx<words.length-1&&FILLERS.has(words[idx].toLowerCase()))idx++;
  const w=words[idx]||target;
  return w.length>2?w[0]+"…":w;
}
function textUsesWord(text,target){
  const toks=(" "+norm(text)+" ").split(" ").filter(Boolean);
  const alt=target.split("/").map(s=>stripArticle(s)).filter(Boolean);
  return alt.some(form=>form.split(" ").every(t=>{
    if(t.length<=3)return toks.includes(t);
    const stem=t.slice(0,Math.max(4,t.length-2));
    return toks.some(tok=>tok.startsWith(stem));
  }));
}

function grade(id,g){

    S.cards[id]={r:0,iv:0,ef:2.5,due:0,step:0};

  const done=schedule(S.cards[id],g,!!w.c);

  else{
    const insertAt=Math.min(queue.length,pos+5);
    queue.splice(insertAt,0,id);

}

function altForms(w){return w.split("/").map(s=>stripArticle(s.trim())).filter(Boolean)}
function showGloss(tok){
  const t=norm(tok);if(!t)return;
  const bar=document.getElementById("glossBar");
  let g=null;
  if(curStory.gloss){for(const k in curStory.gloss){if(stripArticle(k)===t||norm(k)===t){g=curStory.gloss[k];break}}}
  if(!g){
    const hit=WORDS.find(w=>altForms(w.w).includes(t))
      ||WORDS.find(w=>altForms(w.w).some(a=>a.split(" ").includes(t)))
      ||WORDS.find(w=>altForms(w.w).some(a=>a.length>=4&&t.startsWith(a)&&t.length-a.length<=3)) // tapped word is inflection of entry (woorden -> woord)
      ||WORDS.find(w=>altForms(w.w).some(a=>t.length>=4&&a.startsWith(t)&&a.length-t.length<=3));  // entry is longer form of tapped word
    if(hit)g=PROFILE.showNativeLine?hit.e+" · "+PROFILE.nativeFlag+" "+hit.v:hit.e;
  }
  bar.innerHTML=g?`<b>${tok.replace(/[.,!?]/g,"")}</b> — ${g}`:`<b>${tok.replace(/[.,!?]/g,"")}</b> — ${T().notInVocabList}`;
  bar.classList.add("show");
  speak(tok.replace(/[.,!?]/g,""));
}

let targetIds=[];
function pickTargets(){
  const grads=graduatedIds();
  const sorted=grads.sort((a,b)=>{
    const ca=S.cards[a],cb=S.cards[b];
    return (ca.ef-cb.ef)||(ca.iv-cb.iv);
  });
  // weakest cards first (low ease = most lapses), skip ultra-common function words (id<35 heuristic keeps it meaningful)
  targetIds=sorted.filter(id=>id>35).slice(0,7);
  if(targetIds.length<7)targetIds=sorted.slice(0,7);
}
function renderSchrijf(keepText){
  const grads=graduatedIds();
  const box=document.getElementById("targets");
  if(grads.length<15){
    box.innerHTML=`<span class="target">${T().lockMsg}</span>`;
    document.getElementById("schrijfTxt").disabled=true;
  }else{
    document.getElementById("schrijfTxt").disabled=false;
    if(!targetIds.length)pickTargets();
    updateTargets();
  }
  if(!keepText){document.getElementById("schrijfTxt").value="";document.getElementById("aiResult").classList.remove("show")}
  renderJournal();
}
function updateTargets(){
  const text=document.getElementById("schrijfTxt").value;
  const box=document.getElementById("targets");box.innerHTML="";
  targetIds.forEach(id=>{
    const w=byId[id];
    const used=text&&textUsesWord(text,w.w);
    const sp=document.createElement("span");
    sp.className="target"+(used?" used":"");
    sp.textContent=w.w;
    sp.onclick=()=>speak(w.w);
    box.appendChild(sp);
  });
}
function saveEntry(){
  const t=T();
  const text=document.getElementById("schrijfTxt").value.trim();
  if(text.split(/\s+/).length<10)return toast(t.minTenWords);
  const used=targetIds.filter(id=>textUsesWord(text,byId[id].w));
  used.forEach(id=>{const c=S.cards[id];if(c&&c.iv>=1){schedule(c,"good",!!byId[id].c)}});
  S.journal.unshift({d:today(),text,words:targetIds.map(id=>byId[id].w),used:used.length});
  S.journal=S.journal.slice(0,60);
  S.lastSchrijf=Date.now();
  S.days[today()]=true;
  save();
  toast(t.savedWordsUsed(used.length,targetIds.length));
  targetIds=[];renderSchrijf();
}
function buildAiPrompt(){
  return `You are a friendly ${PROFILE.teacherLabel} teacher. A learner wrote this short ${PROFILE.teacherLabel} text. 1) Give a corrected version. 2) List the 2-4 most important corrections with a one-line explanation each (in English). 3) End with one short encouragement in ${PROFILE.teacherLabel}. Keep it concise. Text:\n\n`;
}
async function aiCheck(){
  const t=T();
  const text=document.getElementById("schrijfTxt").value.trim();
  if(!text)return toast(t.writeSomethingFirst);
  const key=(S.settings.apiKey||"").trim();
  const out=document.getElementById("aiResult");
  if(!key){out.textContent=t.noKeySet;out.classList.add("show");return}
  out.textContent=t.checkingInProgress;out.classList.add("show");
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"content-type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:700,messages:[{role:"user",content:buildAiPrompt()+text}]})
    });
    if(!res.ok)throw new Error("API "+res.status);
    const data=await res.json();
    out.textContent=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n")||t.noAnswerReceived;
  }catch(e){
    out.textContent=t.checkFailedTemplate(e.message);
  }
}
function copyPrompt(){
  const t=T();
  const text=document.getElementById("schrijfTxt").value.trim();
  if(!text)return toast(t.writeSomethingFirst);
  const full=buildAiPrompt()+text;
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(full).then(()=>toast(t.copiedPasteInAI)).catch(()=>toast(t.copyFailed));
  }else toast(t.copyNotAvailable);
}
function renderJournal(){
  const t=T();
  const j=document.getElementById("journal");
  if(!S.journal.length){j.innerHTML="";return}
  j.innerHTML=`<h3>${t.journalTitle}</h3>`+S.journal.map(e=>
    `<div class="jentry"><div class="jdate">${e.d} · ${e.used}/${e.words.length} ${t.targetWordsLabel}</div>${e.text.replace(/</g,"&lt;")}</div>`).join("");
}

/* ================= home rendering ================= */
function renderHome(){
  const t=T();
  document.getElementById("gevelsLabel").textContent=PROFILE.streakLabel;
  const icons=PROFILE.icons;
  const row=document.getElementById("gevelRow");row.innerHTML="";
  const now=new Date();
  const dayNames=PROFILE.uiLocale==="en"?["Su","Mo","Tu","We","Th","Fr","Sa"]:["zo","ma","di","wo","do","vr","za"];
  let streak=0;
  for(let i=0;;i++){const d=new Date(now-i*DAY);if(S.days[dateStr(d)])streak++;else{if(i===0)continue;break}if(i>3650)break}
  for(let i=6;i>=0;i--){
    const d=new Date(now-i*DAY),ds=dateStr(d),done=!!S.days[ds];
    const div=document.createElement("div");
    div.className="gevel"+(done?" done":"")+(i===0?" today":"");
    div.innerHTML=`<svg viewBox="0 0 50 40" preserveAspectRatio="xMidYMax meet">
      <path class="body" d="${icons[(7-i)%icons.length]}"/>
      <rect class="win" x="21" y="22" width="8" height="7" rx="1"/>
      <rect class="win" x="21" y="32" width="8" height="8" rx="1"/></svg>
      <span class="day">${dayNames[d.getDay()]}</span>`;
    row.appendChild(div);
  }
  const due=dueCards().length,fresh=Math.min(newAllowance(),unseen().length);
  const started=Object.keys(S.cards).length;
  document.getElementById("stLearned").textContent=started;
  document.getElementById("stDue").textContent=due;
  document.getElementById("stStreak").textContent=streak;
  document.getElementById("stLearned").nextElementSibling.textContent=t.stLearnedLabel;
  document.getElementById("stDue").nextElementSibling.textContent=t.stDueLabel;
  document.getElementById("stStreak").nextElementSibling.textContent=t.stStreakLabel;
  document.getElementById("btnStart").textContent=t.startBtn;
  const btn=document.getElementById("btnStart");
  const note=document.getElementById("sessNote");
  if(due+fresh===0){btn.disabled=true;note.textContent=t.allDoneNote}
  else{btn.disabled=false;note.textContent=`${due} ${t.dueLabel} · ${fresh} ${fresh===1?t.newLabel:t.newLabelPlural} — ± ${Math.max(1,Math.round((due+fresh)*0.3))} ${t.minLabel}`}
  const open=STORIES.filter(st=>started>=st.m).length;
  document.getElementById("lezenNote").textContent=open+"/"+STORIES.length+" "+t.storiesLabel;
  const grads=graduatedIds().length;
  document.getElementById("schrijfNote").textContent=S.journal.length?S.journal.length+" "+t.entriesLabel:t.writeOwnSentencesLabel;
  document.getElementById("schrijfBadge").style.display=(grads>=15&&Date.now()-S.lastSchrijf>6*DAY)?"block":"none";
  document.querySelectorAll("#segNew button").forEach(b=>b.classList.toggle("on",+b.dataset.v===S.settings.newPerDay));
  document.querySelectorAll("#segMode button").forEach(b=>b.classList.toggle("on",b.dataset.v===S.settings.mode));
  document.getElementById("apiKeyIn").value=S.settings.apiKey||"";
}

/* ================= navigation & misc ================= */
function show(id){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));document.getElementById(id).classList.add("active");if(id==="scr-home")renderHome();if(id==="scr-lezen")renderLezen();if(id==="scr-schrijf")renderSchrijf()}
function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2200)}

document.getElementById("btnStart").onclick=startSession;
document.getElementById("btnQuit").onclick=()=>{if(reviewedOk>0){S.days[today()]=true;save()}show("scr-home")};
document.getElementById("btnHome").onclick=()=>show("scr-home");
document.getElementById("btnLezen").onclick=()=>show("scr-lezen");
document.getElementById("btnSchrijf").onclick=()=>show("scr-schrijf");
document.getElementById("btnReaderBack").onclick=()=>{speechSynthesis.cancel();show("scr-lezen")};
document.querySelectorAll(".backbtn").forEach(b=>b.onclick=()=>show("scr-home"));
document.getElementById("rPlay").onclick=()=>speak(curStory.txt,0.92);
document.getElementById("rPlaySlow").onclick=()=>speak(curStory.txt,0.7);
document.getElementById("rStop").onclick=()=>speechSynthesis.cancel();
document.getElementById("btnSaveEntry").onclick=saveEntry;
document.getElementById("btnAiCheck").onclick=aiCheck;
document.getElementById("btnCopyPrompt").onclick=copyPrompt;
document.getElementById("btnNewTargets").onclick=()=>{targetIds=[];pickTargets();updateTargets();toast(T().newWordsChosen)};
document.getElementById("schrijfTxt").addEventListener("input",()=>updateTargets());
document.getElementById("btnSettings").onclick=()=>document.getElementById("settingsPanel").classList.toggle("open");
document.querySelectorAll("#segNew button").forEach(b=>b.onclick=()=>{S.settings.newPerDay=+b.dataset.v;save();renderHome()});
document.querySelectorAll("#segMode button").forEach(b=>b.onclick=()=>{S.settings.mode=b.dataset.v;save();renderHome()});
document.getElementById("apiKeyIn").addEventListener("change",e=>{S.settings.apiKey=e.target.value.trim();save();toast(T().keySaved)});
document.getElementById("btnReset").onclick=()=>{if(confirm(T().resetConfirmTemplate(PROFILE.tagline))){S=JSON.parse(JSON.stringify(DEFAULT));save();renderHome();toast(T().resetDone)}};
document.getElementById("btnExport").onclick=()=>{
  const payload=Object.assign({_profile:activeId},S);
  const blob=new Blob([JSON.stringify(payload)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  const fileTag=PROFILE.brandHtml.replace(/<[^>]+>/g,"").toLowerCase();
  a.download=fileTag+"-backup-"+today()+".json";a.click();URL.revokeObjectURL(a.href);
};
document.getElementById("btnImport").onclick=()=>document.getElementById("importFile").click();
document.getElementById("importFile").onchange=e=>{
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const s=JSON.parse(r.result);if(!s.cards)throw 0;
      if(s._profile&&s._profile!==activeId&&PROFILES[s._profile]){
        const otherName=PROFILES[s._profile].tabLabel;
        const thisName=PROFILE.tabLabel;
        toast(T().wrongProfileFileTemplate(otherName,thisName));
        e.target.value="";return;
      }
      delete s._profile;
      S=Object.assign({},JSON.parse(JSON.stringify(DEFAULT)),s);save();renderHome();toast(T().progressImported);
    }catch(err){toast(T().invalidFile)}
  };
  r.readAsText(f);e.target.value="";
};

setProfile(activeId);
if("serviceWorker" in navigator){navigator.serviceWorker.register("./sw.js").catch(()=>{})}
</script>
